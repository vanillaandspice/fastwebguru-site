<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="12" fill="#1A1A1A"/>

  <!-- Running figure — orange, centred, bold strokes for favicon readability -->
  <!-- Head -->
  <circle cx="42" cy="11" r="6" fill="#F97316"/>
  <!-- Torso (leaning forward) -->
  <line x1="40" y1="17" x2="34" y2="32" stroke="#F97316" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Right arm (forward / up) -->
  <line x1="38" y1="23" x2="50" y2="17" stroke="#F97316" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left arm (back / down) -->
  <line x1="38" y1="23" x2="26" y2="29" stroke="#F97316" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right leg (forward / knee up) -->
  <polyline points="34,32 42,44 50,38" stroke="#F97316" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Left leg (back / trailing) -->
  <polyline points="34,32 26,44 18,38" stroke="#F97316" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
