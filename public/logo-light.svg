<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 52" role="img" aria-label="Fast Web Guru">
  <title>Fast Web Guru</title>

  <!-- Speed lines (orange) — left of runner -->
  <line x1="3"  y1="22" x2="20" y2="22" stroke="#F97316" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="0"  y1="30" x2="24" y2="30" stroke="#F97316" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="3"  y1="38" x2="17" y2="38" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Running figure (white — for dark backgrounds) -->
  <circle cx="36" cy="9" r="6" fill="#FAFAF9"/>
  <path d="M35 15 L32 31" stroke="#FAFAF9" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M34 20 L44 14" stroke="#FAFAF9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M34 20 L24 26" stroke="#FAFAF9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M32 31 L38 43 L44 38" stroke="#FAFAF9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M32 31 L26 41 L20 36" stroke="#FAFAF9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark: Fast (orange) WebGuru (white) -->
  <text x="52" y="38"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="900" fill="#F97316">Fast</text>
  <text x="110" y="38"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="900" fill="#FAFAF9">Web</text>
  <text x="172" y="38"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="900" fill="#FAFAF9">Guru</text>
</svg>
